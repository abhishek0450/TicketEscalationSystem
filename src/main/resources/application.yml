server:
  port: 8080

spring:
  application:
    name: ticketing-system

  sql:
    init:
      mode: always

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ticketing_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1150}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your@gmail.com}
    password: ${MAIL_PASSWORD:yourpassword}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-make-it-long-your-256-bit-secret-key-here-make-it-long}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  escalation:
    scheduler-cron: "0 */30 * * * *"

logging:
  level:
    com.ticketing: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
